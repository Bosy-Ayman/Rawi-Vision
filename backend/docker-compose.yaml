x-minio-common: &minio-common
  image: quay.io/minio/minio:latest
  command: server --console-address ":9090" /data
  ports: 
    - "9000:9000"
    - "9090:9090"
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
    interval: 30s
    timeout: 20s
    retries: 3
  env_file:
    - .env

services:
  minio1: 
    <<: *minio-common
    hostname: minio1
    volumes:
      - ./data/compose:/data
  rabbitmq:
    image: rabbitmq:latest
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    configs:
      - source: rabbitmq-plugins
        target: /etc/rabbitmq/enabled_plugins
    volumes:
      - rabbitmq-lib:/var/lib/rabbitmq/
      - rabbitmq-log:/var/log/rabbitmq

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    # TODO: Define ports and environment for Zookeeper
    ports:
      - "22181:2181"

  kafka:
    image: confluentinc/cp-kafka:latest
    # TODO: Define Kafka environment and broker settings
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"

configs:
  rabbitmq-plugins:
    content: "[rabbitmq_management]."  

volumes:
  rabbitmq-lib:
    driver: local
  rabbitmq-log:
    driver: local
